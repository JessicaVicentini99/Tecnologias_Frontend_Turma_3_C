<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Charmander</title>
        <style>
            body {
                font-family: Arial;
                background-color: #f4f4f4;
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
            }

            .card {
                background-color: white;
                width: 300px;
                border-radius: 10px;
                box-shadow: 0 0 20px rgba(0, 0, 0, 0.435);
                text-align: center;
                padding: 20px;
            }

            .card img {
                width: 250px;
                /*Define uma transição suave para a propriedade transform*/
                transition: transform 0.3s;

            }

            .card img:hover {
                /*Regra que aplica uma transformação sobre a tag img
                no caso aumenta a escala da tag em 5%*/
                transform: scale(1.05);
            }

            .mais {
                text-align: left;
            }
        </style>
    </head>    
    <body>
        <div class="card">
            <h1>Charmander</h1>
            <img src="charmander.png" alt="Charmander">
            <p>
                The flame on its tail shows the strength of its life-force. If Charmander is weak, the flame also burns weakly.
            </p>
            <button>Mostrar Mais</button>
            <ul class="mais">
                <li>Type: Fire</li>
                <li>Weakness: Water, Ground, Rock</li>
                <li>Category: Lizard</li>
            </ul>
        </div>
    </body>
</html>
